name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "30 3 * * 6"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: c-cpp
            build-mode: manual

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # The project requires C++23 (ranges::to, views::join_with, append_range).
      # ubuntu-latest ships GCC 13 as default which lacks these.
      # GCC 15 from ubuntu-toolchain-r/test PPA has full C++23 library support.
      - name: Install dependencies and build
        if: matrix.build-mode == 'manual'
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
          CC: gcc-15
          CXX: g++-15
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++-15
          git clone --depth 1 https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          cmake --preset release
          cmake --build --preset release --parallel

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          category: "/language:${{ matrix.language }}"

      - name: Upload build logs on failure
        if: failure() && matrix.build-mode == 'manual'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codeql-build-logs-${{ github.run_attempt }}
          path: |
            build/release/vcpkg-manifest-install.log
            build/release/CMakeFiles/CMakeConfigureLog.yaml
          if-no-files-found: ignore
          retention-days: 5
