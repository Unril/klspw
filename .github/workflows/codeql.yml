name: CodeQL

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - ".kiro/**"
      - "scripts/**"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**.md"
      - ".kiro/**"
      - "scripts/**"
  schedule:
    - cron: "30 3 * * 6"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
      CC: gcc-15
      CXX: g++-15

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: c-cpp
            build-mode: manual

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # The project requires C++23 (ranges::to, views::join_with, append_range).
      # ubuntu-latest ships GCC 13 as default which lacks these.
      # GCC 15 from ubuntu-toolchain-r/test PPA has full C++23 library support.
      - name: Install GCC 15
        if: matrix.build-mode == 'manual'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++-15

      - name: Create vcpkg binary cache dir
        if: matrix.build-mode == 'manual'
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Cache vcpkg binaries
        if: matrix.build-mode == 'manual'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key:
            codeql-${{ runner.arch }}-vcpkg2-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json',
            '**/CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            codeql-${{ runner.arch }}-vcpkg2-

      - name: Build
        if: matrix.build-mode == 'manual'
        run: |
          git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          git -C "$VCPKG_ROOT" checkout 401bb04e16e1ae03fdbec04edea4e52c93e9aeb5
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          cmake --preset release
          cmake --build --preset release --parallel

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: "/language:${{ matrix.language }}"

      - name: Upload build logs on failure
        if: failure() && matrix.build-mode == 'manual'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codeql-build-logs-${{ github.run_attempt }}
          path: |
            build/release/vcpkg-manifest-install.log
            build/release/CMakeFiles/CMakeConfigureLog.yaml
          if-no-files-found: ignore
          retention-days: 5
