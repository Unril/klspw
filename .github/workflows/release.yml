name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-26
            xcode: /Applications/Xcode_26.4.app
            artifact_name: klspw-darwin-arm64
          - name: macOS x86_64
            os: macos-26-intel
            xcode: /Applications/Xcode_26.4.app
            artifact_name: klspw-darwin-x86_64
          - name: Linux x86_64
            os: ubuntu-latest
            cc: gcc-15
            cxx: g++-15
            artifact_name: klspw-linux-x86_64

    permissions:
      contents: read
      id-token: write
      attestations: write

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
      CC: ${{ matrix.cc || '' }}
      CXX: ${{ matrix.cxx || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Select Xcode
        if: matrix.xcode
        run: |
          sudo xcode-select -s ${{ matrix.xcode }}/Contents/Developer
          c++ --version

      - name: Install GCC 15 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++-15
          $CXX --version

      - name: Create vcpkg binary cache dir
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Cache vcpkg binaries
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key:
            ${{ runner.os }}-${{ runner.arch }}-vcpkg-${{ hashFiles('vcpkg.json',
            '**/CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-vcpkg-

      - name: Acquire vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Build
        run: |
          cmake --preset release
          cmake --build --preset release --parallel

      - name: Test
        run: ctest --preset release --output-on-failure

      - name: Package
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          cp build/release/klspw dist/${{ matrix.artifact_name }}/klspw
          strip dist/${{ matrix.artifact_name }}/klspw
          tar -C dist -czf dist/${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Attest release archive
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/${{ matrix.artifact_name }}.tar.gz

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.tar.gz

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download built archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release-assets/*/*.tar.gz \
            --verify-tag \
            --generate-notes
