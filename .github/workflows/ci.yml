name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS 26 arm64
            os: macos-26
            xcode: /Applications/Xcode_26.4.app
          - name: macOS 26 Intel
            os: macos-26-intel
            xcode: /Applications/Xcode_26.4.app
          - name: Ubuntu 24.04
            os: ubuntu-latest
            cc: gcc-15
            cxx: g++-15

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
      CC: ${{ matrix.cc || '' }}
      CXX: ${{ matrix.cxx || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        if: matrix.xcode
        run: |
          sudo xcode-select -s ${{ matrix.xcode }}/Contents/Developer
          xcodebuild -version
          c++ --version

      - name: Install GCC 15 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++-15
          $CXX --version

      - name: Create vcpkg binary cache dir
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Cache vcpkg binaries
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key:
            ${{ runner.os }}-${{ runner.arch }}-vcpkg-${{ hashFiles('vcpkg.json',
            '**/CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-vcpkg-

      - name: Acquire vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release --parallel

      - name: Test
        run: ctest --preset release --output-on-failure

      - name: Install into staging
        run: |
          rm -rf "$PWD/stage"
          cmake --install build/release --prefix "$PWD/stage"

      - name: Smoke test
        run: |
          ./stage/bin/klspw --version
          ./stage/bin/klspw init test/fixtures/projects/multi

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-logs-${{ matrix.os }}-${{ github.run_attempt }}
          path: |
            build/release/vcpkg-manifest-install.log
            build/release/Testing/Temporary/LastTest.log
            build/release/CMakeFiles/CMakeConfigureLog.yaml
          if-no-files-found: ignore
          retention-days: 5
