name: ci

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS 26 arm64
            os: macos-26
            xcode: /Applications/Xcode_26.4.app
          - name: macOS 26 Intel
            os: macos-26-intel
            xcode: /Applications/Xcode_26.4.app

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
      # Optional but recommended for reproducibility:
      # VCPKG_COMMIT: 0123456789abcdef0123456789abcdef01234567

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        if: matrix.xcode
        run: |
          sudo xcode-select -s ${{ matrix.xcode }}/Contents/Developer
          xcodebuild -version
          c++ --version

      - name: Create vcpkg binary cache dir
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Cache vcpkg binaries
        uses: actions/cache@v5
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ runner.os }}-${{ runner.arch }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json',
            '**/CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-vcpkg-

      - name: Acquire vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          # Optional but recommended:
          # git -C "$VCPKG_ROOT" checkout "$VCPKG_COMMIT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release --parallel

      - name: Test
        run: ctest --preset release --output-on-failure

      - name: Install into staging
        run: |
          rm -rf "$PWD/stage"
          cmake --install build/release --prefix "$PWD/stage"

      - name: Smoke test
        run: |
          ./stage/bin/klspw --version
          ./stage/bin/klspw init test/fixtures/projects/multi
