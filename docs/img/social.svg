<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img"
  aria-label="klspw social preview" xml:lang="en">
  <title>klspw - Generate workspace.json for kotlin-lsp from Gradle builds</title>
  <desc>Social preview image showing the klspw tool name, a Kotlin-inspired diamond logo, tagline,
    and terminal snippet with install and usage commands</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e" />
      <stop offset="100%" stop-color="#16213e" />
    </linearGradient>
    <style>
      .mono { font-family: ui-monospace, 'Cascadia Code', 'Fira Code', Menlo, monospace; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial,
      sans-serif; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)" />

  <!-- Kotlin-inspired diamond -->
  <g transform="translate(200, 220)">
    <polygon points="0,0 100,0 100,100 0,100" fill="#7F52FF" opacity="0.9" />
    <polygon points="0,0 50,50 0,100" fill="#E44857" opacity="0.85" />
    <polygon points="0,0 100,0 50,50" fill="#C711E1" opacity="0.7" />
  </g>

  <!-- Tool name -->
  <text x="340" y="295" class="mono" font-size="96" font-weight="700" fill="#ffffff"
    letter-spacing="-2">klspw</text>

  <!-- Tagline -->
  <text x="200" y="370" class="sans" font-size="28" fill="#a0aec0">Generate workspace.json for
    kotlin-lsp from Gradle builds</text>

  <!-- Terminal snippet -->
  <g transform="translate(200, 420)">
    <rect width="880" height="140" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1" />
    <g aria-hidden="true">
      <circle cx="24" cy="20" r="6" fill="#ff5f57" />
      <circle cx="44" cy="20" r="6" fill="#febc2e" />
      <circle cx="64" cy="20" r="6" fill="#28c840" />
    </g>
    <text x="24" y="60" class="mono" font-size="20" fill="#9ca3b0">$</text>
    <text x="48" y="60" class="mono" font-size="20" fill="#e6edf3">brew install Unril/tap/klspw</text>
    <text x="24" y="90" class="mono" font-size="20" fill="#9ca3b0">$</text>
    <text x="48" y="90" class="mono" font-size="20" fill="#e6edf3">klspw -c . init -d ./src</text>
    <text x="24" y="120" class="mono" font-size="20" fill="#9ca3b0">$</text>
    <text x="48" y="120" class="mono" font-size="20" fill="#e6edf3">klspw generate</text>
  </g>
</svg>